apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    apps: myapp
    type: front-end
spec:
  replicas: 6
  selector:
    matchLabels:
      apps: myapp
      type: front-end
  template:
    metadata:
      labels:
        apps: myapp
        type: front-end
    spec:
      containers:
      - name: nginx
        image: nginx
